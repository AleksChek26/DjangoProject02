server {
    listen 80;
    server_name _; # Можно указать домен, если есть

    location /static/ {
        # ВАЖНО: Путь должен совпадать с тем, что монтируется в docker-compose!
        # Если в docker-compose у вас ./static:/static, то здесь пишем alias /static/;
        alias /static/;
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    location /media/ {
        alias /media/;
        expires 30d;
    }

    location / {
        proxy_pass http://web:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_redirect off;

        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
    }

    location ~ /\. {
        access_log off;
        log_not_found off;
        deny all;
    }
}
