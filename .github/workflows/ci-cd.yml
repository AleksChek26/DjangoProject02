name: CI/CD DjangoProject02

on:
  push:
    branches: [ '**' ]
  pull_request:
    branches: [ '**' ]

env:
  # Общие переменные для всех job
  DATABASE_URL: postgres://myproject:myproject@postgres:5432/myproject

jobs:
  build-test-lint:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ['3.9', '3.10', '3.11', '3.12']
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: myproject
          POSTGRES_USER: myproject
          POSTGRES_PASSWORD: myproject
        volumes:
          - postgres_data:/var/lib/postgresql/data
        ports:
          - "5432:5432"
    env:
      SECRET_KEY: ${{ secrets.SECRET_KEY }}
      PYTHONPATH: ${{ github.workspace }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v4
        with:
          python-version: ${{ matrix.python-version }}

      - name: Cache Poetry dependencies
        uses: actions/cache@v4
        with:
          path: ~/.cache/pypoetry/virtualenvs
          key: ${{ runner.os }}-poetry-${{ hashFiles('**/poetry.lock') }}
          restore-keys: |
            ${{ runner.os }}-poetry-

      - name: Install Poetry
        run: pip install poetry

      - name: Install dependencies
        run: poetry install

      - name: Run tests
        run: poetry run python manage.py test

      - name: Linting (flake8)
        run: poetry run flake8 .

  build-docker-image:
    needs: build-test-lint
    runs-on: ubuntu-latest
    if: needs.build-test-lint.result == 'success'
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Build Docker image
        run: |
          docker build --no-cache -t myproject .
          docker run --rm myproject python manage.py check

  deploy-to-server:
    needs: build-docker-image
    runs-on: ubuntu-latest
    if: needs.build-docker-image.result == 'success'
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deploy via SSH (Docker Compose)
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: 22
          script: |
            set -e
            cd /home/test/myproject || { echo "Directory not found"; exit 1; }
            git pull origin main || { echo "Git pull failed"; exit 1; }
            docker-compose pull --parallel
            docker-compose up -d --remove-orphans --build
            echo "Deployment completed successfully"
