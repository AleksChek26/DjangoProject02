name: CI/CD DjangoProject02


on:
  push:
    branches: [ '*' ]
  pull_request:
    branches: [ '*' ]

env:
  DATABASE_URL: postgres://myproject:myproject@postgres:5432/myproject
  DATABASE_HOST: postgres
  DATABASE_PORT: 5432
  DATABASE_NAME: myproject
  DATABASE_USER: myproject
  DATABASE_PASSWORD: myproject


jobs:
  build-test-lint:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ['3.9', '3.10', '3.11', '3.12']
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: myproject
          POSTGRES_USER: myproject
          POSTGRES_PASSWORD: myproject
        options: >
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10
        ports:
          - 5432:5432
    env:
      SECRET_KEY: ${{ secrets.SECRET_KEY }}
      PYTHONPATH: ${{ github.workspace }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v4
        with:
          python-version: ${{ matrix.python-version }}

      - name: Cache Poetry dependencies
        uses: actions/cache@v4
        with:
          path: ~/.cache/pypoetry/virtualenvs
          key: ${{ runner.os }}-poetry-${{ hashFiles('**/poetry.lock') }}
          restore-keys: |
            ${{ runner.os }}-poetry-

      - name: Install Poetry
        run: pip install poetry

      - name: Install dependencies
        run: poetry install

      - name: Debug: Check network connectivity
        run: |
          echo "Checking network connectivity..."
          nslookup postgres || echo "nslookup failed"
          sleep 5

      - name: Wait for PostgreSQL with multiple checks
        run: |
          for i in {1..120}; do
            # Check DNS resolution
            if ! nslookup postgres >/dev/null 2>&1; then
              echo "DNS not ready, attempt $i"
              sleep 2
              continue
            fi

            # Check port connectivity
            if ! nc -z -w 5 postgres 5432; then
              echo "Port not ready, attempt $i"
              sleep 2
              continue
            fi

            # Final check with psycopg2
            if poetry run python -c "
              import psycopg2, time
              try:
                conn = psycopg2.connect(
                  host='$DATABASE_HOST',
                  port='$DATABASE_PORT',
                  dbname='$DATABASE_NAME',
                  user='$DATABASE_USER',
                  password='$DATABASE_PASSWORD'
                )
                conn.close()
                print('PostgreSQL is fully ready')
                exit(0)
              except Exception as e:
                print(f'Connection failed: {e}')
                time.sleep(2)
            " 2>/dev/null; then
              break
            fi
          done

      - name: Run tests
        env:
          DATABASE_HOST: ${{ env.DATABASE_HOST }}
          DATABASE_PORT: ${{ env.DATABASE_PORT }}
          DATABASE_NAME: ${{ env.DATABASE_NAME }}
          DATABASE_USER: ${{ env.DATABASE_USER }}
          DATABASE_PASSWORD: ${{ env.DATABASE_PASSWORD }}
          SECRET_KEY: ${{ secrets.SECRET_KEY }}
        run: |
          poetry run python manage.py test

      - name: Linting (flake8)
        run: poetry run flake8 .

  build-docker-image:
    needs: build-test-lint
    runs-on: ubuntu-latest
    if: needs.build-test-lint.result == 'success'
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Cache Docker layers
        uses: actions/cache@v4
        with:
          path: /tmp/.buildx-cache
          key: ${{ runner.os }}-buildx-${{ github.sha }}
          restore-keys: |
            ${{ runner.os }}-buildx-

      - name: Build Docker image
        run: |
          docker build --build-arg DB_HOST=postgres -t myproject:${{ github.sha }} .
          docker run --rm --network host myproject:${{ github.sha }} python manage.py check

  deploy-to-server:
    needs: build-docker-image
    runs-on: ubuntu-latest
    if: needs.build-docker-image.result == 'success'
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deploy via SSH (Docker Compose)
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: 22
          script: |
            set -e
            cd /home/test/myproject || { echo "Directory not found"; exit 1; }
            git pull origin main || { echo "Git pull failed"; exit 1; }
            [ -f docker-compose.yml ] || { echo "docker-compose.yml not found"; exit 1; }
            docker-compose pull --parallel
            docker-compose up -d --remove-orphans --build
            docker-compose ps
            echo "Deployment completed successfully"

      - name: Notify on failure
        if: failure()
        uses: rtCamp/action-slack-notify@v2
        env:
          SLACK_WEBHOOK: ${{ secrets.SLACK_WEBHOOK }}
          SLACK_MESSAGE: 'CI/CD pipeline failed for DjangoProject02'
