name: CI/CD DjangoProject02

on:
  push:
    branches: [ '*' ]
  pull_request:
    branches: [ '*' ]

env:
  DATABASE_URL: postgres://myproject:myproject@postgres:5432/myproject


jobs:
  build-test-lint:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ['3.9', '3.10', '3.11', '3.12']
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: myproject
          POSTGRES_USER: myproject
          POSTGRES_PASSWORD: myproject
        options: >
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432
    env:
      SECRET_KEY: ${{ secrets.SECRET_KEY }}
      PYTHONPATH: ${{ github.workspace }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v4
        with:
          python-version: ${{ matrix.python-version }}

      - name: Cache Poetry dependencies
        uses: actions/cache@v4
        with:
          path: ~/.cache/pypoetry/virtualenvs
          key: ${{ runner.os }}-poetry-${{ hashFiles('**/poetry.lock') }}
          restore-keys: |
            ${{ runner.os }}-poetry-

      - name: Install Poetry
        run: pip install poetry

      - name: Install dependencies
        run: poetry install

      - name: Wait for PostgreSQL readiness
        run: |
          for i in {1..60}; do
            if poetry run python -c "
              import psycopg2
              try:
                conn = psycopg2.connect('$DATABASE_URL')
                conn.close()
                print('PostgreSQL is ready')
                exit(0)
              except Exception:
                pass
            " 2>/dev/null; then
              break
            fi
            echo "Waiting for PostgreSQL... (attempt $i)"
            sleep 5
          done

      - name: Run tests
        env:
          DATABASE_HOST: postgres
          SECRET_KEY: ${{ secrets.SECRET_KEY }}
        run: |
          poetry run python manage.py test

      - name: Linting (flake8)
        run: poetry run flake8 .

  build-docker-image:
    needs: build-test-lint
    runs-on: ubuntu-latest
    if: needs.build-test-lint.result == 'success'
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Cache Docker layers
        uses: actions/cache@v4
        with:
          path: /tmp/.buildx-cache
          key: ${{ runner.os }}-buildx-${{ github.sha }}
          restore-keys: |
            ${{ runner.os }}-buildx-

      - name: Build Docker image
        run: |
          docker build --build-arg DB_HOST=postgres -t myproject:${{ github.sha }} .
          docker run --rm --network host myproject:${{ github.sha }} python manage.py check

  deploy-to-server:
    needs: build-docker-image
    runs-on: ubuntu-latest
    if: needs.build-docker-image.result == 'success'
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deploy via SSH (Docker Compose)
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: 22
          script: |
            set -e
            cd /home/test/myproject || { echo "Directory not found"; exit 1; }
            git pull origin main || { echo "Git pull failed"; exit 1; }
            [ -f docker-compose.yml ] || { echo "docker-compose.yml not found"; exit 1; }
            docker-compose pull --parallel
            docker-compose up -d --remove-orphans --build
            docker-compose ps
            echo "Deployment completed successfully"

      - name: Notify on failure
        if: failure()
        uses: rtCamp/action-slack-notify@v2
        env:
          SLACK_WEBHOOK: ${{ secrets.SLACK_WEBHOOK }}
          SLACK_MESSAGE: 'CI/CD pipeline failed for DjangoProject02'
